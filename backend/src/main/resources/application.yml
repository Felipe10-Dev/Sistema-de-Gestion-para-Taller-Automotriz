server:
  port: 8080

spring:
  application:
    name: serviteca-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/serviteca}
    username: ${DB_USERNAME:serviteca}
    password: ${DB_PASSWORD:serviteca123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: America/Bogota

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:4a6f5a71586a356c6f62444c396d75526d466c3447314c376a355733696546325a386e356b356c4d346133553d}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: Serviteca Backend
    version: 1.0.0
    description: Sistema de Gesti\u00f3n para Serviteca

logging:
  config: classpath:logback-spring.xml
  level:
    com.serviteca: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
