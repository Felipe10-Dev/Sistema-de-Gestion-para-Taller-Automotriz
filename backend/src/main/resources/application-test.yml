spring:
  datasource:
    url: jdbc:h2:mem:serviteca;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  h2:
    console:
      enabled: true
      path: /h2-console

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.security: DEBUG
    com.serviteca: DEBUG

app:
  jwt:
    secret: 4a6f5a71586a356c6f62444c396d75526d466c3447314c376a355733696546325a386e356b356c4d346133553d
    expiration-ms: 3600000
    refresh-expiration-ms: 86400000
