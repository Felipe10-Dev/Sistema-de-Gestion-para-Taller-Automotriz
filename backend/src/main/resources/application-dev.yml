spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.serviteca: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG
